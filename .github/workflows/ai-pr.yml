name: AI README PR from Issue

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-readme-pr:
    if: contains(github.event.issue.labels.*.name, 'ai-pr') || contains(github.event.issue.labels.*.name, 'ai')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai

      - name: Prepare fixed branch
        run: |
          set -e
          git fetch origin

          BRANCH="ai/issue-${{ github.event.issue.number }}-readme"

          if git ls-remote --exit-code --heads origin "$BRANCH"; then
            echo "Branch exists, checkout from remote"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            echo "Branch does not exist, create from current HEAD"
            git checkout -b "$BRANCH"
          fi

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Generate AI content
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_PROMPT_ID: ${{ secrets.OPENAI_PROMPT_ID }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python .github/scripts/ai_plan.py > README.md

      - name: Commit and push branch
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
            exit 0
          fi

          git commit -m "docs: update README for issue #${{ github.event.issue.number }}"
          git push --force-with-lease origin "$BRANCH"

          echo "HAS_CHANGES=true" >> $GITHUB_ENV

      - name: Create draft PR
        if: env.HAS_CHANGES == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AI] README update for issue #${context.issue.number}`,
              head: process.env.BRANCH,
              base: "main",
              body: `Auto-generated from issue #${context.issue.number}.\n\nPlease review before merging.`,
              draft: true
            })
      - name: Cleanup old AI branches
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            const prefix = `ai/issue-${issueNumber}-readme-`;

            const branches = await github.rest.repos.listBranches({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            for (const b of branches.data) {
              if (b.name.startsWith(prefix)) {
                console.log(`Deleting old branch: ${b.name}`);
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${b.name}`
                });
              }
            }
