name: AI README PR from Issue

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ai-readme-pr-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  ai-readme-pr:
    if: contains(github.event.issue.labels.*.name, 'ai-pr') || contains(github.event.issue.labels.*.name, 'ai')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openai

      - name: Prepare fixed branch
        run: |
          set -e
          git fetch origin

          BRANCH="ai/issue-${{ github.event.issue.number }}-readme"

          if git ls-remote --exit-code --heads origin "$BRANCH"; then
            echo "Branch exists, checkout from remote"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            echo "Branch does not exist, create from current HEAD"
            git checkout -b "$BRANCH"
          fi

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Generate AI content
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_PROMPT_ID: ${{ secrets.OPENAI_PROMPT_ID }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python .github/scripts/ai_plan.py > README.md

      - name: Commit and push branch
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
            exit 0
          fi

          git commit -m "docs: update README for issue #${{ github.event.issue.number }}"
          git push --force-with-lease origin "$BRANCH"

          echo "HAS_CHANGES=true" >> $GITHUB_ENV

      - name: Find existing PR
        id: find_pr
        if: env.HAS_CHANGES == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const headBranch = `${context.repo.owner}:${process.env.BRANCH}`;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              head: headBranch,
              base: "main"
            });

            if (prs.length > 0) {
              core.setOutput("exists", "true");
              core.setOutput("number", String(prs[0].number));
              core.setOutput("url", prs[0].html_url);
              console.log(`Existing PR found: ${prs[0].html_url}`);
            } else {
              core.setOutput("exists", "false");
              console.log("No existing PR found.");
            }

      - name: Create draft PR
        if: env.HAS_CHANGES == 'true' && steps.find_pr.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[AI] README update for issue #${context.issue.number}`,
              head: process.env.BRANCH,
              base: "main",
              body: `Auto-generated from issue #${context.issue.number}.\n\nPlease review before merging.`,
              draft: true
            });

            console.log(`Created PR: ${pr.data.html_url}`);

      - name: Reuse existing PR
        if: env.HAS_CHANGES == 'true' && steps.find_pr.outputs.exists == 'true'
        run: |
          echo "PR already exists: ${{ steps.find_pr.outputs.url }}"

      - name: Cleanup old AI branches
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            const prefix = `ai/issue-${issueNumber}-readme-`;

            const branches = await github.rest.repos.listBranches({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            for (const b of branches.data) {
              if (b.name.startsWith(prefix)) {
                console.log(`Deleting old branch: ${b.name}`);
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${b.name}`
                });
              }
            }
